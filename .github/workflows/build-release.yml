# Build Release: build .deb (Ubuntu) + .msi (Windows) và publish GitHub Release.
# Trigger: push tag vMAJOR.MINOR.PATCH hoặc workflow_dispatch (tag đã tồn tại).
name: Build Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag release đã tồn tại (vd. v1.2.3)"
        required: true
        type: string

# Tránh chạy trùng trên cùng ref/tag
concurrency:
  group: build-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Build jobs chỉ đọc repo; job release mới cần ghi Release
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Chuẩn hóa tag + version SemVer (bỏ prefix "v")
  # ---------------------------------------------------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      ref: ${{ steps.meta.outputs.ref }}
    steps:
      - name: Resolve tag and version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag không hợp lệ (cần vMAJOR.MINOR.PATCH): ${TAG}" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "ref=refs/tags/${TAG}" >> "${GITHUB_OUTPUT}"
          echo "Release ${TAG} → version ${VERSION}"

  # ---------------------------------------------------------------------------
  # Ubuntu: Nuitka deploy + .deb (đồng bộ với Windows)
  # ---------------------------------------------------------------------------
  build-deb:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          fetch-depth: 1

      - name: Verify tag exists
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          git rev-parse "${{ needs.prepare.outputs.ref }}"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install project dependencies (incl. Nuitka / ziglang)
        run: uv sync --extra build

      - name: Sync version in pyproject.toml from git tag
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          uv run python - <<'PY'
          import os, re
          from pathlib import Path
          v = os.environ["VERSION"]
          p = Path("pyproject.toml")
          text = p.read_text(encoding="utf-8")
          new, n = re.subn(r'(?m)^version\s*=\s*"[^"]*"', f'version = "{v}"', text, count=1)
          if n != 1:
              raise SystemExit("Không tìm thấy dòng version trong pyproject.toml")
          p.write_text(new, encoding="utf-8")
          print(f"pyproject.toml → {v}")
          PY

      - name: Install system packages (Nuitka build + Qt runtime + dpkg-deb)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dpkg-dev patchelf gcc g++ \
            libegl1 libgl1 libxkbcommon0 libxkbcommon-x11-0 \
            libdbus-1-3 libfontconfig1 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-sync1 libxcb-xfixes0 libxcb-xkb1 \
            libzbar0

      - name: Build deploy/ (pyside6-deploy / Nuitka)
        run: ./scripts/build_deploy_linux.sh

      - name: Build .deb package
        run: ./scripts/build_deb.sh deploy

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v6
        with:
          name: deb-package
          path: dist/central-logger-app_${{ needs.prepare.outputs.version }}_amd64.deb
          if-no-files-found: error
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Windows: Nuitka deploy + WiX MSI
  # ---------------------------------------------------------------------------
  build-msi:
    needs: prepare
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          fetch-depth: 1

      - name: Avoid detached HEAD (cleaner logs)
        shell: bash
        run: git switch -C "release-${{ needs.prepare.outputs.version }}"

      - name: Verify tag exists
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          git rev-parse "${{ needs.prepare.outputs.ref }}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Sync version in pyproject.toml from git tag
        shell: pwsh
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          $py = @"
          import os, re
          from pathlib import Path
          v = os.environ['VERSION']
          p = Path('pyproject.toml')
          text = p.read_text(encoding='utf-8')
          new, n = re.subn(r'(?m)^version\s*=\s*"[^"]*"', f'version = "{v}"', text, count=1)
          if n != 1:
              raise SystemExit('version line not found')
          p.write_text(new, encoding='utf-8')
          print(f'pyproject.toml -> {v}')
          "@
          python -c $py

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install WiX Toolset 7
        run: |
          dotnet tool install --global wix
          wix --version

      - name: Build deploy/ (pyside6-deploy / Nuitka)
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass
          & "${{ github.workspace }}\scripts\build_deploy_windows.ps1"

      - name: Build MSI installer
        shell: pwsh
        run: |
          & "${{ github.workspace }}\scripts\build_msi.ps1" `
            -DeployDir deploy `
            -Version "${{ needs.prepare.outputs.version }}"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v6
        with:
          name: msi-package
          path: dist/CentralLogger-${{ needs.prepare.outputs.version }}-win64.msi
          if-no-files-found: error
          retention-days: 14

  # ---------------------------------------------------------------------------
  # GitHub Release: đính kèm .deb + .msi
  # ---------------------------------------------------------------------------
  release:
    needs: [prepare, build-deb, build-msi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true

      - name: List release files
        run: find release-assets -type f -ls

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Central Logger ${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          make_latest: true
          overwrite_files: true
          body: |
            ## Central Logger ${{ needs.prepare.outputs.version }}

            | Platform | File | Install |
            |----------|------|---------|
            | Ubuntu / Debian amd64 | `central-logger-app_*_amd64.deb` | `sudo apt install ./central-logger-app_*.deb` |
            | Windows x64 | `CentralLogger-*-win64.msi` | Double-click hoặc `msiexec /i` |

            **Runtime:** Linux cần `libzbar0` (khai báo trong Depends của .deb). Windows có thể cần [VC++ Redistributable x64](https://learn.microsoft.com/en-us/cpp/windows/latest-supported-vc-redist) nếu app không khởi động sau cài MSI.

            Built from tag `${{ needs.prepare.outputs.tag }}`.
          files: |
            release-assets/**/*.deb
            release-assets/**/*.msi
