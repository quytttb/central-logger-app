# Dev Build: push main → .deb (Ubuntu) + .msi (Windows), upload artifacts (không GitHub Release).
name: Dev Build

on:
  push:
    branches:
      - main
    paths:
      - "**.py"
      - "**.qml"
      - "**.sh"
      - "**.ps1"
      - "**.toml"
      - "**.spec"
      - "scripts/**"
      - "packaging/**"
      - "resources/**"
      - "pysidedeploy.spec"
      - ".github/workflows/dev-build.yml"
      - ".github/workflows/build-release.yml"
  workflow_dispatch:

concurrency:
  group: dev-build-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build-deb:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Read version from pyproject.toml
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(grep -m1 '^version' pyproject.toml | sed -E 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Dev build version: ${VERSION}"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install project dependencies (incl. Nuitka / ziglang)
        run: uv sync --extra build

      - name: Install system packages (Nuitka build + Qt runtime + dpkg-deb)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dpkg-dev patchelf gcc g++ \
            libegl1 libgl1 libxkbcommon0 libxkbcommon-x11-0 \
            libdbus-1-3 libfontconfig1 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-sync1 libxcb-xfixes0 libxcb-xkb1 \
            libzbar0

      - name: Build deploy/ (pyside6-deploy / Nuitka)
        run: ./scripts/build_deploy_linux.sh

      - name: Build .deb package
        run: ./scripts/build_deb.sh deploy

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v6
        with:
          name: central-logger-dev-deb-${{ github.sha }}
          path: dist/central-logger-app_${{ steps.meta.outputs.version }}_amd64.deb
          if-no-files-found: error
          retention-days: 7

  build-msi:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - name: Read version from pyproject.toml
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(grep -m1 '^version' pyproject.toml | sed -E 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Dev build version: ${VERSION}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Install WiX Toolset v3 (heat, candle, light)
        shell: pwsh
        run: |
          $env:Path = [System.Environment]::GetEnvironmentVariable('Path', 'Machine') + ';' + [System.Environment]::GetEnvironmentVariable('Path', 'User')
          $heatPath = $null
          $heatCmd = Get-Command heat.exe -ErrorAction SilentlyContinue
          if ($heatCmd) {
            $heatPath = $heatCmd.Source
          } else {
            $found = Get-ChildItem -Path "${env:ProgramFiles(x86)}\WiX Toolset v3*" -Filter heat.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $heatPath = $found.FullName }
          }
          if (-not $heatPath) {
            choco install wixtoolset -y --no-progress
            $env:Path = [System.Environment]::GetEnvironmentVariable('Path', 'Machine') + ';' + [System.Environment]::GetEnvironmentVariable('Path', 'User')
            $heatCmd = Get-Command heat.exe -ErrorAction SilentlyContinue
            if ($heatCmd) {
              $heatPath = $heatCmd.Source
            } else {
              $found = Get-ChildItem -Path "${env:ProgramFiles(x86)}\WiX Toolset v3*" -Filter heat.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($found) { $heatPath = $found.FullName }
            }
          } else {
            Write-Host "WiX already available: $heatPath"
          }
          if (-not $heatPath) {
            throw "heat.exe not found. Install WiX Toolset v3 or fix Chocolatey."
          }
          $wixBin = Split-Path $heatPath -Parent
          Write-Host "WiX bin: $wixBin"
          echo "$wixBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build deploy/ (pyside6-deploy / Nuitka)
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass
          & "${{ github.workspace }}\scripts\build_deploy_windows.ps1"

      - name: Build MSI installer
        shell: pwsh
        run: |
          & "${{ github.workspace }}\scripts\build_msi.ps1" -DeployDir deploy

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v6
        with:
          name: central-logger-dev-msi-${{ github.sha }}
          path: dist/CentralLogger-${{ steps.meta.outputs.version }}-win64.msi
          if-no-files-found: error
          retention-days: 7
